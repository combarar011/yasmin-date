<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasmin Date 💜</title>

<style>
*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#c084fc,#7c3aed);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  width:90%;
  max-width:420px;
  padding:30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 50px #0003;
}

.unicorn{
  font-size:80px;
}

h1{
  color:#6d28d9;
}

button{
  border:0;
  padding:14px 35px;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  margin:10px;
}

#yes{
  background:#ec4899;
  color:white;
}

#no{
  background:#ddd;
  position:absolute;
}

.hidden{
  display:none;
}

.option{
  background:#f3e8ff;
  padding:15px;
  border-radius:20px;
  margin:10px;
  cursor:pointer;
}

.option:hover{
  background:#e9d5ff;
}

</style>
</head>

<body>

<div class="card" id="page1">

<div class="unicorn">🦄</div>

<h1>
Yasmin, will you go on a date with me? 💜
</h1>

<button id="yes" onclick="yesClick()">YES 💖</button>

<button id="no" onmouseover="moveNo()">NO 😈</button>

</div>


<div class="card hidden" id="page2">

<div class="unicorn">🦄✨</div>

<h1>
WAIT YOU ACTUALLY SAID YES?? 😭💜
</h1>

<p>Choose our date:</p>

<input type="date">

<br><br>

<input type="time">

<br><br>

<button id="yes" onclick="foodPage()">Next 💜</button>

</div>



<div class="card hidden" id="page3">

<h1>Choose our food 🍽️</h1>

<div class="option">🍕 Pizza</div>
<div class="option">🍣 Sushi</div>
<div class="option">🍔 Burger</div>
<div class="option">🍗 Chicken</div>
<div class="option">🥙 Shawarma</div>
<div class="option">🥩 Kofta</div>

<button id="yes" onclick="finish()">Confirm 💜</button>

</div>



<div class="card hidden" id="page4">

<div class="unicorn">🦄💜</div>

<h1>
Date Confirmed ✨
</h1>

<p>
Can't wait to see you Yasmin 💜
</p>

</div>


<script>

function yesClick(){
 document.getElementById("page1").classList.add("hidden");
 document.getElementById("page2").classList.remove("hidden");
}

function moveNo(){
 let x=Math.random()*250;
 let y=Math.random()*250;

 let btn=document.getElementById("no");

 btn.style.left=x+"px";
 btn.style.top=y+"px";
}

function foodPage(){
 document.getElementById("page2").classList.add("hidden");
 document.getElementById("page3").classList.remove("hidden");
}

function finish(){
 document.getElementById("page3").classList.add("hidden");
 document.getElementById("page4").classList.remove("hidden");
}

</script>

</body>
</html>
