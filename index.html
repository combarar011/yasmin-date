<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ahmed 🦄</title>

<style>

*{
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
    linear-gradient(135deg,#eee7ff,#d8c8ff,#f3e8ff);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}


.card{

    width:90%;
    max-width:430px;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(15px);
    border-radius:35px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 20px 60px #8b5cf655;

    animation:open .6s ease;
}


@keyframes open{

from{
opacity:0;
transform:scale(.8) translateY(30px);
}

to{
opacity:1;
transform:scale(1) translateY(0);
}

}


.close{

animation:close .4s forwards;

}


@keyframes close{

to{
opacity:0;
transform:scale(.8);
}

}



.unicorn{

font-size:75px;
animation:float 3s infinite ease-in-out;

}


@keyframes float{

50%{
transform:translateY(-12px);
}

}



h1{

color:#7c3aed;
font-size:26px;

}


p{

color:#64748b;
font-size:17px;

}


button{

border:none;
padding:14px 35px;
border-radius:50px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin:10px;
transition:.3s;

}


button:hover{

transform:scale(1.08);

}


.yes{

background:#f472b6;
color:white;
box-shadow:0 10px 25px #f472b666;

}


.no{

background:#f1f5f9;
color:#64748b;

}



.buttons{

display:flex;
justify-content:center;
position:relative;
height:70px;

}



.option{

background:#f5f3ff;
padding:18px;
border-radius:22px;
margin:12px 0;
cursor:pointer;
transition:.3s;
font-size:18px;

}


.option:hover{

background:#ede9fe;
transform:translateY(-5px);

}



.hidden{

display:none;

}


input{

padding:12px;
border-radius:15px;
border:1px solid #ddd;
margin:8px;
font-size:16px;

}


</style>
</head>
<body>
